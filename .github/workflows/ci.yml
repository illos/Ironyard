name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # TODO: wire `pnpm --filter @ironyard/data build:data` here once the
      # data-md tarball-fetch is implemented. The build currently reads from a
      # local clone at .reference/data-md (gitignored), and the pin in
      # packages/data/sources.json is still "main.placeholder". apps/api needs
      # monsters.json at typecheck time — the build now mirrors it to
      # apps/api/src/data/, but CI has no source to read from yet.
      # In the meantime, the api package commits a placeholder monsters.json
      # OR developers run build:data locally before pushing schema-coupled
      # changes. Phase 2 finalizes the data pipeline.

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Regenerate canon registry
        run: pnpm canon:gen

      - name: Verify canon registry matches docs/rules-canon.md
        run: git diff --exit-code packages/rules/src/canon-status.generated.ts
