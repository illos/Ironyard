name = "ironyard-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8787

# D1 binding. `database_id` is a placeholder — replace with the value printed
# by `wrangler d1 create ironyard` before deploying. Local `wrangler dev` uses
# a Miniflare-backed SQLite file in .wrangler/state and ignores the id.
[[d1_databases]]
binding = "DB"
database_name = "ironyard"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "drizzle"

# Durable Object — one SessionDO per game session. Phase 0 handles WebSocket
# ping/pong + member-list broadcasts; Phase 1 lights up the intent log.
[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDO"

[[migrations]]
tag = "v1"
new_classes = ["SessionDO"]
